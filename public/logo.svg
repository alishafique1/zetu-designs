<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64' fill='none' role='img' aria-label='Social Dots Design Studio'>
  <title>Social Dots Design Studio</title>
  <!-- Outer square frame -->
  <rect x="8" y="8" width="48" height="48" rx="4" stroke="#1A1A2E" stroke-width="3" fill="none"/>
  <!-- Three dots in brand colors -->
  <circle cx="22" cy="32" r="7" fill="#2D74FF"/>
  <circle cx="32" cy="32" r="7" fill="#E67E22"/>
  <circle cx="42" cy="32" r="7" fill="#1A1A2E"/>
  <!-- Small accent dots -->
  <circle cx="22" cy="32" r="2" fill="white" opacity="0.6"/>
  <circle cx="32" cy="32" r="2" fill="white" opacity="0.6"/>
  <circle cx="42" cy="32" r="2" fill="white" opacity="0.6"/>
</svg>

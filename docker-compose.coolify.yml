# Standalone compose for running zetu-app on the VPS, discovered by Coolify Traefik proxy.
# No docker-compose.override needed — use this as-is.
#
# Usage:
#   docker compose -f docker-compose.coolify.yml up -d --build
#
# What this does:
#   - Builds the app from the local Dockerfile
#   - Joins the 'coolify' Docker network so Traefik auto-discovers it
#   - Uses Traefik labels → coolify-proxy routes zetu.socialdots.ca → this container
#   - App inside container listens on :3000, Traefik handles SSL termination
#
# Requirements:
#   - .env file with all real credentials present
#   - 'coolify' Docker network must exist on the host

services:
  zetu-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zetu-app
    restart: unless-stopped
    networks:
      - default
      - coolify
    environment:
      NODE_ENV: production
      PORT: 3000
      # Point at your Postgres (Supabase or existing)
      DATABASE_URL: ${DATABASE_URL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_STARTER_PRICE_ID: ${STRIPE_STARTER_PRICE_ID}
      STRIPE_PRO_PRICE_ID: ${STRIPE_PRO_PRICE_ID}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_WEBHOOK_SECRET: ${CLERK_WEBHOOK_SECRET}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      NEXT_PUBLIC_APP_URL: https://zetu.socialdots.ca
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    labels:
      # Traefik/Coolify discovery labels
      - "traefik.enable=true"
      - "traefik.http.routers.zetu.rule=Host(`zetu.socialdots.ca`)"
      - "traefik.http.routers.zetu.entrypoints=websecure"
      - "traefik.http.routers.zetu.tls.certresolver=letsencrypt"
      - "traefik.http.services.zetu.loadbalancer.server.port=3000"
      - "coolify.expose=true"
      - "coolify.name=zetu-app"

networks:
  default:
    name: zetu-net
  coolify:
    external: true
